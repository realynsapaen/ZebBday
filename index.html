  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #c8e6c9;
      background-image:
        radial-gradient(circle at 15% 20%, #b2dfdb 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, #a5d6a7 0%, transparent 45%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 24px;
      overflow: hidden;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      animation: fall linear infinite;
      opacity: 0.65;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.65; }
      90%  { opacity: 0.65; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }

    /* ── Card scene ── */
    .card-scene {
      position: relative;
      z-index: 1;
      width: 456px;
      height: 520px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 56px rgba(40,80,40,0.22), 0 4px 12px rgba(0,0,0,0.08);
    }

    /* ── Pages ── */
    .page {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: transform 0.55s cubic-bezier(.77,0,.18,1);
    }

    #coverPage  { transform: translateX(0); }
    #insidePage { transform: translateX(100%); }

    .card-scene.opened #coverPage  { transform: translateX(-100%); }
    .card-scene.opened #insidePage { transform: translateX(0); }

    /* ══════════════════════════════
       COVER PAGE
    ══════════════════════════════ */
    #coverPage {
      background: #2d5a3d;
      display: flex;
      flex-direction: column;
    }

    .cover-photo-area {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    
    #coverImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    .cover-footer {
      background: linear-gradient(135deg, #2d5a3d, #3a8a4a);
      padding: 16px 24px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .cover-name {
      font-family: 'Baloo 2', cursive;
      font-weight: 900;
      font-size: 38px;
      color: #fff;
      line-height: 1.1; 
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      letter-spacing: 2px;
    }
    .cover-badge {
      display: inline-block;
      background: #FF7F5C;
      color: #fff;
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 14px; 
      padding: 4px 18px;
      border-radius: 40px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 6px;
      box-shadow: 0 4px 12px rgba(255,127,92,0.4);
    }

    .open-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.3);
      border: 1.5px solid rgba(255,255,255,0.7);
      color: #fff;
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 26px;
      border-radius: 24px;
      cursor: pointer;
      letter-spacing: 0.5px;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .open-btn:hover { 
      background: rgba(255,255,255,0.455);
      transform: translate(-50%, -3px);
    }

    /* ══════════════════════════════
       INSIDE PAGE
    ══════════════════════════════ */
    #insidePage {
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .inside-header {
      background: linear-gradient(135deg, #3a8a4a 0%, #5cb85c 60%, #7ecf6e 100%);
      padding: 64px 24px 14px;
      text-align: center;
      flex-shrink: 0;
      position: relative;
    }

    .back-btn {
      position: absolute;
      top: 18px;
      left: 18px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s;
      transform: scale(1.5);
      transform-origin: top left;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    .inside-koala-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0px;
    }
    
    .inside-koala-row h2 {
      font-family: 'Baloo 2', cursive;
      font-weight: 900;
      font-size: 39px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      letter-spacing: 1px;
      line-height: 1;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    .koala-svg { animation: bounce 2.5s ease-in-out infinite; }

    .mini-koalas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 5;
    }
    .mini-koala {
      position: absolute;
      font-size: 20px;
      opacity: 0.55;
      line-height: 1;
      filter: brightness(0.5) drop-shadow(0 2px 3px rgba(0,0,0,0.25));
      animation: koalaFloat 3.5s ease-in-out infinite;
    }
    @keyframes koalaFloat {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      50%      { transform: translateY(-12px) rotate(6deg); }
    }

    .leaf-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0px;
    }
    .leaf {
      display: inline-block;
      font-size: 18px;
      animation: sway 3s ease-in-out infinite;
    }
    .leaf:nth-child(2) { animation-delay: 0.4s; }
    .leaf:nth-child(3) { animation-delay: 0.8s; }
    @keyframes sway {
      0%, 100% { transform: rotate(-8deg); }
      50%       { transform: rotate(8deg); }
    }

    .wave { display: block; width: 100%; background: #3a8a4a; line-height: 0; flex-shrink: 0; }
    .wave svg { display: block; }

    .inside-body {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      overflow: hidden;
    }

    .invite-line {
      font-family: 'Baloo 2', cursive;
      font-weight: 600;
      font-size: 22px;
      color: #5cb85c;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0px;
    }

    .details { display: flex; flex-direction: column; gap: 14px; margin-bottom: 0; }
    .detail-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f5fbf5;
      border-radius: 16px;
      padding: 14px 18px;
      box-shadow: 0 4px 12px rgba(92,184,92,0.06);
    }
    .detail-icon { font-size: 24px; flex-shrink: 0; }
    .detail-text strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #5cb85c;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .detail-text span {
      font-size: 14px;
      font-weight: 600;
      color: #2d4a2d;
      line-height: 1.4;
    }

    .inside-footer {
      background: #3a8a4a;
      padding: 10px;
      text-align: center;
      flex-shrink: 0;
      font-size: 16px;
    }
  </style>
</head>
